<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORK WORK WORK - Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<script src="/static/js/common.js"></script>
<script src="/static/js/logs.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="logsApp">
<header>
  <h1>WORK WORK WORK</h1>
  <nav>
    <a href="/">Kanban</a>
    <a href="/tasks">Tasks</a>
    <a href="/logs" class="active">Logs</a>
    <a href="/schedules">Schedules</a>
    <a href="/prompts">Prompts</a>
    <a href="/debug-logs">Debug</a>
  </nav>
  <button id="pauseBtn" onclick="togglePause()" style="margin-left:auto;font-family:var(--font-display);font-size:.7rem;padding:5px 14px;border:1px solid var(--ghost);background:transparent;color:var(--text-secondary);cursor:pointer;text-transform:uppercase;letter-spacing:.04em">PAUSE</button>
</header>
<div class="container">
  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Total Runs</div><div class="stat-value" x-text="stats.total_runs"></div></div>
    <div class="stat-card"><div class="stat-label">Success Rate</div><div class="stat-value" x-text="stats.success_rate + '%'"></div></div>
    <div class="stat-card"><div class="stat-label">Total Cost</div><div class="stat-value" x-text="fmtCost(stats.total_cost)"></div></div>
  </div>

  <!-- Cost Chart -->
  <div class="cost-chart" x-show="stats.daily_costs && stats.daily_costs.length > 0">
    <h3>Daily Cost (USD)</h3>
    <div class="chart-bars">
      <template x-for="d in stats.daily_costs" :key="d.date">
        <div class="chart-bar" :style="'height:' + chartBarHeight(d.cost)">
          <div class="chart-tip" x-text="d.date + '\n' + fmtCost(d.cost)"></div>
        </div>
      </template>
    </div>
    <div class="chart-labels">
      <template x-for="d in stats.daily_costs" :key="'lbl-' + d.date">
        <span x-text="d.date.slice(5)"></span>
      </template>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <label>Status
      <select x-model="filterStatus" @change="resetAndLoad()">
        <option value="">All</option>
        <option value="success">success</option>
        <option value="error">error</option>
        <option value="timeout">timeout</option>
        <option value="skipped">skipped</option>
      </select>
    </label>
    <label>Model
      <select x-model="filterModel" @change="resetAndLoad()">
        <option value="">All</option>
        <option value="sonnet">sonnet</option>
        <option value="opus">opus</option>
        <option value="haiku">haiku</option>
      </select>
    </label>
    <label>Schedule
      <select x-model="filterSchedule" @change="resetAndLoad()">
        <option value="">All</option>
        <option value="spot">spot taskのみ</option>
        <option value="schedule">scheduleのみ</option>
      </select>
    </label>
  </div>

  <!-- Table -->
  <div class="table-wrap logs-table">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th><th>Task</th><th>Status</th><th>Model</th><th>Cost</th><th>Duration</th><th>Source</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="log in logs" :key="log.id">
          <tr @click="openLogDetail(log.id)" style="cursor:pointer">
            <td x-text="fmtLocalTime(log.timestamp)"></td>
            <td>
              <span x-show="log.task_external_id" style="font-family:var(--font-display);font-size:.7rem;color:var(--text-secondary);margin-right:4px" x-text="'#' + log.task_external_id"></span>
              <span x-text="log.task_name || '-'"></span>
              <span x-show="log.schedule_id" style="font-family:var(--font-display);font-size:.6rem;background:rgba(58,134,255,.1);color:var(--info);padding:2px 6px;border-radius:0;margin-left:6px;text-transform:uppercase;letter-spacing:0.04em">schedule</span>
            </td>
            <td><span :class="statusClass(log.status)" x-text="log.status"></span></td>
            <td x-text="log.model || '-'"></td>
            <td style="font-family:var(--font-display)" x-text="fmtCost(log.cost_usd)"></td>
            <td style="font-family:var(--font-display)" x-text="fmtDuration(log.duration_seconds)"></td>
            <td x-text="log.task_source || '-'"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <button :disabled="!hasPrev" @click="changePage(-1)">PREV</button>
    <span x-text="pageInfo"></span>
    <button :disabled="!hasNext" @click="changePage(1)">NEXT</button>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay logs-modal" :class="{ active: showDetailModal }" @click.self="showDetailModal = false">
  <div class="modal" x-show="detailLog">
    <h2 x-text="detailLog ? (detailLog.task_name || 'Log #' + detailLog.id) : ''"></h2>
    <div class="detail-grid">
      <template x-for="f in detailFields" :key="f[0]">
        <div class="detail-field">
          <div class="label" x-text="f[0]"></div>
          <div class="value" x-text="String(f[1] != null ? f[1] : '-')"></div>
        </div>
      </template>
      <template x-for="f in detailFullFields" :key="f[0]">
        <div class="detail-field full">
          <div class="label" x-text="f[0]"></div>
          <div class="value" x-text="String(f[1] || '-')"></div>
        </div>
      </template>
    </div>
    <div class="modal-actions">
      <button @click="showDetailModal = false" style="font-family:var(--font-display);padding:9px 22px;border-radius:0;border:1px solid var(--ghost);font-size:.85rem;cursor:pointer;font-weight:600;background:transparent;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em">Close</button>
    </div>
  </div>
</div>
</body>
</html>
